spring:
  application:
    name: rag-api

rag:
  berget:
    api-base-url: ${BERGET_API_BASE_URL:https://api.berget.ai/v1}
    api-key: ${BERGET_API_KEY:}
  course-id: ${RAG_COURSE_ID:skogskurs}
  embedding-model: ${RAG_EMBEDDING_MODEL:intfloat/multilingual-e5-large-instruct}
  expected-embedding-dimensions: ${RAG_EXPECTED_EMBEDDING_DIMENSIONS:1024}
  chat-model: ${RAG_CHAT_MODEL:openai/gpt-oss-120b}
  retrieval:
    min-similarity: ${RAG_MIN_SIMILARITY:0.7}
    limit: ${RAG_LIMIT:5}
