name: Build and Push RAG API Docker Image

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  docker-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file transcribe/api/pom.xml

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/119210083484/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-aiplaygroud-myf@myforesttracker.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-north1-docker.pkg.dev

      - name: Compute short SHA
        id: shortsha
        run: echo "short_sha=$(git rev-parse --short=7 ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -f transcribe/api/Dockerfile -t europe-north1-docker.pkg.dev/myforesttracker/myforesttracker/rag-api:${{ steps.shortsha.outputs.short_sha }} transcribe

      - name: Push Docker image
        run: docker push europe-north1-docker.pkg.dev/myforesttracker/myforesttracker/rag-api:${{ steps.shortsha.outputs.short_sha }}

      - name: Update dev image tag
        uses: mikefarah/yq@v4
        with:
          cmd: yq -i '.images[] |= (select(.name == "europe-north1-docker.pkg.dev/myforesttracker/myforesttracker/rag-api") .newTag = strenv(SHORT_SHA))' transcribe/api/k8s/overlays/dev/kustomization.yaml
        env:
          SHORT_SHA: ${{ steps.shortsha.outputs.short_sha }}

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push dev tag update
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add transcribe/api/k8s/overlays/dev/kustomization.yaml
          git commit -m "chore: update rag-api image tag to ${{ steps.shortsha.outputs.short_sha }}"
          git push
